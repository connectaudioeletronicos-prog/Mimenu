<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar - Palatos</title>
<link rel="stylesheet" href="css/cliente-auth.css">
</head>
<body>
  <div class="auth-caixa auth-caixa--login">
    <div class="auth-conteudo auth-conteudo--login">
      <div class="auth-logo auth-logo--centro">
        <span class="auth-logo__texto">pal<span class="auth-logo__destaque">a</span>tos</span>
        <div class="auth-logo__slogan">
          <span class="auth-logo__slogan-traco auth-logo__slogan-traco--verde"></span>
          <span class="auth-logo__slogan--verde">MAIS SABOR.</span>
          <span class="auth-logo__slogan--laranja">MAIS PRATICIDADE.</span>
          <span class="auth-logo__slogan-traco auth-logo__slogan-traco--laranja"></span>
        </div>
      </div>

      <h1 class="auth-titulo-centro"><strong>Bem-vindo</strong> de volta!</h1>
      <p class="auth-sub auth-sub--centro">Faça login para continuar e aproveitar o melhor do <strong>Palatos</strong>.</p>

      <form id="form-login-cliente" novalidate>
        <label class="campo-auth">
          <input type="text" id="login-identificador" placeholder="E-mail" required>
        </label>
        <label class="campo-auth">
          <input type="password" id="login-senha" placeholder="Senha" required>
        </label>

        <p class="auth-esqueci"><a href="#" id="link-esqueci-senha">Esqueceu sua senha?</a></p>

        <p id="erro-login" class="auth-erro oculto"></p>

        <button type="submit" class="auth-botao-principal">→ Entrar</button>
      </form>

      <div class="auth-divisor">ou continue com</div>
      <button type="button" id="botao-google-login" class="auth-botao-google">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.98v2.33A9 9 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.17.28-1.7V4.97H.98A9 9 0 0 0 0 9c0 1.45.35 2.83.98 4.03l2.97-2.33z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .98 4.97l2.97 2.33C4.66 5.17 6.65 3.58 9 3.58z"/>
        </svg>
        Continuar com Google
      </button>

      <p class="auth-rodape">Ainda não tem uma conta? <a href="cliente-cadastro.html">Criar conta</a></p>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/config.js"></script>
  <script src="js/cliente-auth.js"></script>
</body>
</html>
